name: Python

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: "recursive"

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Fmt
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --tests -- -D warnings
      - name: Check
        run: cargo check
      - name: Test
        run: cargo test

  # lint-python:
  #   name: Lint Python code
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v7

  #     - name: Set up Python 3.8
  #       uses: actions/setup-python@v2
  #       with:
  #         python-version: "3.8"

  #     - name: run pre-commit
  #       run: |
  #         python -m pip install pre-commit
  #         pre-commit run --all-files

  test-python:
    name: Build and test Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.9", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: "recursive"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install a specific version of uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.8.x"

      - name: Build rust submodules
        run: |
          # Note: core module should be first, because it could be depended on
          # by others in the future
          uv run maturin develop -m geoarrow-core/Cargo.toml
          uv run maturin develop -m geoarrow-compute/Cargo.toml
          uv run maturin develop -m geoarrow-io/Cargo.toml

      # Ensure docs build without warnings
      - name: Check docs
        if: "${{ matrix.python-version == 3.12 }}"
        run: uv run mkdocs build --strict

      - name: Run python tests
        run: |
          uv run pytest tests
