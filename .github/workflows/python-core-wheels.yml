  #       with:
  #         python-version: 3.x
  #     - name: Build wheels
  #       uses: PyO3/maturin-action@v1
  #       with:
  #         target: ${{ matrix.platform.target }}
  #         args: --release --out dist -i 3.9 -i 3.10 -i 3.11 -i 3.12 -i 3.13 -i 3.14 --manifest-path python/${{ matrix.module }}/Cargo.toml
  #         sccache: "true"
  #         manylinux: musllinux_1_2
  #     - name: Upload wheels
  #       uses: actions/upload-artifact@v7
  #       with:
  #         name: wheels-musllinux-${{ matrix.platform.target }}-${{ matrix.module }}
  #         path: dist

  windows:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
        module:
          - geoarrow-core
          - geoarrow-compute
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # Every interpreter passed to `-i` below must be installed: on
          # Windows, maturin can't build for a missing interpreter without
          # pyo3's generate-import-lib feature.
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
            3.14
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i 3.9 -i 3.10 -i 3.11 -i 3.12 -i 3.13 -i 3.14 --manifest-path python/${{ matrix.module }}/Cargo.toml
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}-${{ matrix.module }}
          path: dist

  macos:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
        module:
          - geoarrow-core
          - geoarrow-compute
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i 3.9 -i 3.10 -i 3.11 -i 3.12 -i 3.13 -i 3.14 --manifest-path python/${{ matrix.module }}/Cargo.toml
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}-${{ matrix.module }}
          path: dist

  # PEP 783 emscripten wheels for Pyodide, currently only for geoarrow-core.
  #
  # The Rust toolchain, Emscripten version, rustflags, and platform tag are all
  # defined by pyodide-build.
  #
  # Unlike the other jobs, this also runs on every pull request, to catch
  # emscripten build regressions (e.g. a dependency update that doesn't
  # compile or link for this target) before release time.
  emscripten:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        module:
          - geoarrow-core
        include:
          # Pyodide's pinned toolchain for Python 3.13 is (nightly-2025-02-01,
          # rustc 1.86). It requires nightly, so we bump to a newer version.
          - python-version: "3.13"
            rust-toolchain-override: nightly-2026-06-01
          # Pyodide's pinned toolchain for Python 3.14 is 1.93.0.
          # The 3.14 toolchain can use stable, so we bump to our MSRV.
          - python-version: "3.14"
            rust-toolchain-override: 1.95
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.x"
          python-version: ${{ matrix.python-version }}

      - name: Install pyodide-build
        run: uv sync --only-group pyodide
        working-directory: python

      - name: Get pyodide config
        id: pyodide-config
        run: |
          {
            echo "rust-toolchain=$(uv run --no-sync pyodide config get rust_toolchain)"
            echo "pyodide-abi-version=$(uv run --no-sync pyodide config get pyodide_abi_version)"
            echo "rustflags=$(uv run --no-sync pyodide config get rustflags)"
            echo "cflags=$(uv run --no-sync pyodide config get cflags)"
          } >> "$GITHUB_OUTPUT"
        working-directory: python

      # Install Emscripten via the Pyodide cross-build environment rather
      # than a stock emsdk: this pins the Emscripten version matching the
      # target Pyodide ABI, and applies Pyodide's patches to Emscripten,
      # several of which affect dynamic linking of Rust side modules.
      # https://github.com/pyodide/pyodide/tree/main/emsdk/patches
      # https://github.com/kylebarron/arro3/pull/502#discussion_r3392470467
      - name: Install emsdk (Pyodide xbuildenv)
        env:
          PYODIDE_XBUILDENV_PATH: ${{ github.workspace }}/.pyodide-xbuildenv
        run: |
          uv run --no-sync pyodide xbuildenv install
          uv run --no-sync pyodide xbuildenv install-emscripten
          # shellcheck disable=SC1090
          source "$PYODIDE_XBUILDENV_PATH/$(uv run --no-sync pyodide xbuildenv version)/emsdk/emsdk_env.sh"
          {
            echo "EMSDK=$EMSDK"
            echo "EMSDK_NODE=$EMSDK_NODE"
          } >> "$GITHUB_ENV"
          {
            echo "$EMSDK"
            echo "$EMSDK/upstream/emscripten"
            dirname "$EMSDK_NODE"
          } >> "$GITHUB_PATH"
        working-directory: python

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide-config.outputs.rustflags }}
          CFLAGS_wasm32_unknown_emscripten: ${{ steps.pyodide-config.outputs.cflags }}
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide-config.outputs.pyodide-abi-version }}
        with:
          target: wasm32-unknown-emscripten
          rust-toolchain: ${{ matrix.rust-toolchain-override || steps.pyodide-config.outputs.rust-toolchain }}
          args: --release --out dist -i ${{ matrix.python-version }} --manifest-path python/${{ matrix.module }}/Cargo.toml
          sccache: "true"

      # PyPI rejects legacy emscripten_x_y_z tags; fail before upload if
      # maturin didn't emit the PEP 783 pyemscripten tag.
      - name: Verify platform tag
        run: |
          ls -lh dist/
          if ! ls dist/*pyemscripten*.whl >/dev/null 2>&1; then
            echo "No pyemscripten-tagged wheel found in dist/" >&2
            exit 1
          fi

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-emscripten-py${{ matrix.python-version }}-${{ matrix.module }}
          path: dist

  # sdist:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v7
  #     - name: Build sdist
  #       uses: PyO3/maturin-action@v1
  #       with:
  #         command: sdist
  #         args: --out dist --manifest-path python/${{ matrix.module }}/Cargo.toml
  #     - name: Upload sdist
  #       uses: actions/upload-artifact@v7
  #       with:
  #         name: wheels-sdist
  #         path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # The artifact names use the module (directory) name; the PyPI
          # package names have an extra `-rust-`.
          - module: geoarrow-core
            package: geoarrow-rust-core
          - module: geoarrow-compute
            package: geoarrow-rust-compute
    environment:
      name: pypi-release
      url: https://pypi.org/p/${{ matrix.package }}
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: [linux, windows, macos, emscripten]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*-${{ matrix.module }}
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
